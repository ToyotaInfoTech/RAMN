name: Build

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  build_all:
    name: ${{ matrix.variant == 'default' && matrix.conf || format('{0} ({1})', matrix.conf, matrix.variant) }} (tag ${{ matrix.cubeide_docker_tag }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        spice: [RAMNV1]
        conf: [Release, Debug]
        cubeide_docker_tag: ["15.0"]
        variant: [default, gsusb]

    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Modify ramn_config.h for ${{ matrix.variant }}
        if: matrix.variant == 'gsusb'
        run: |
          python3 .github/modify_config.py \
            --ecu TARGET_ECUA \
            --variant "${{ matrix.variant }}" \
            --enable "ENABLE_GSUSB"

      - name: Build all ECUs (${{ matrix.conf }})
        env:
          DOCKER_STM32CUBEIDE_TAG: ${{ matrix.cubeide_docker_tag }}
        run: |
          chmod +x scripts/build/docker_BUILD_Clean_${{ matrix.conf }}.sh scripts/build/_build_ecu.sh
          bash scripts/build/docker_BUILD_Clean_${{ matrix.conf }}.sh --no-quiet

      - name: Collect hex file sizes
        if: always()
        run: |
          mkdir -p build-metrics
          for ecu in ECUA ECUB ECUC ECUD; do
            hex="scripts/firmware/${ecu}.hex"
            if [ -f "$hex" ]; then
              echo "${ecu}=$(wc -c < "$hex" | tr -d ' ')" >> build-metrics/hex-sizes.txt
            else
              echo "${ecu}=N/A" >> build-metrics/hex-sizes.txt
            fi
          done

      - name: Upload build metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-metrics-${{ matrix.spice }}-${{ matrix.variant }}-${{ matrix.conf }}-${{ matrix.cubeide_docker_tag }}
          path: build-metrics/

      - name: Upload firmware
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.variant }}-${{ matrix.conf }}
          path: scripts/firmware/*.hex

  macro_coverage:
    name: ${{ matrix.variant }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: gsusb
            enable: "ENABLE_GSUSB"
            disable: "ENABLE_CDC"
          - variant: no_uds
            enable: ""
            disable: "ENABLE_UDS ENABLE_UDS_REPROGRAMMING"
          - variant: no_extras
            enable: ""
            disable: "ENABLE_J1979 ENABLE_MINICTF ENABLE_CHIP8 ENABLE_SCREEN ENABLE_SPI"
          - variant: no_debug
            enable: ""
            disable: "ENABLE_USB_DEBUG ENABLE_JOYSTICK_CONTROLS ENABLE_SCREEN ENABLE_CHIP8 GENERATE_RUNTIME_STATS"
          - variant: kwp
            enable: "ENABLE_KWP"
            disable: ""
          - variant: no_dynamic_bitrate
            enable: ""
            disable: "ENABLE_DYNAMIC_BITRATE"
          - variant: watchdog
            enable: "WATCHDOG_ENABLE"
            disable: ""
          - variant: uart
            enable: "ENABLE_UART"
            disable: "ENABLE_CDC ENABLE_USB"

    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Modify ramn_config.h
        run: |
          python3 .github/modify_config.py \
            --variant "${{ matrix.variant }}" \
            --enable "${{ matrix.enable }}" \
            --disable "${{ matrix.disable }}"

      - name: Macro-testing build all ECUs (${{ matrix.variant }})
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          chmod +x scripts/build/docker_BUILD_Clean_Release.sh scripts/build/_build_ecu.sh
          bash scripts/build/docker_BUILD_Clean_Release.sh --no-quiet 2>&1 | tee build-output.log

      - name: Collect build results
        if: always()
        run: |
          mkdir -p macro-results
          {
            echo "variant=${{ matrix.variant }}"
            echo "enable=${{ matrix.enable }}"
            echo "disable=${{ matrix.disable }}"
            echo "outcome=${{ steps.build.outcome }}"
            for ecu in ECUA ECUB ECUC ECUD; do
              hex="scripts/firmware/${ecu}.hex"
              if [ -f "$hex" ]; then
                echo "hex_size_${ecu}=$(wc -c < "$hex" | tr -d ' ')"
              else
                echo "hex_size_${ecu}=N/A"
              fi
            done
            if [ -f build-output.log ]; then
              warn_count=$(grep -ci 'warning:' build-output.log || true)
            else
              warn_count=0
            fi
            echo "warnings=${warn_count}"
          } > macro-results/result.txt

      - name: Upload macro results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macro-results-${{ matrix.variant }}
          path: macro-results/

      - name: Upload firmware
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-variant-${{ matrix.variant }}
          path: scripts/firmware/*.hex

      - name: Report build result
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "### ✅ Build PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Build FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Failed configuration details:**" >> $GITHUB_STEP_SUMMARY
            echo "- **Variant:** \`${{ matrix.variant }}\`" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ matrix.enable }}" ]; then
              echo "- **Macros enabled:** \`${{ matrix.enable }}\`" >> $GITHUB_STEP_SUMMARY
            fi
            if [ -n "${{ matrix.disable }}" ]; then
              echo "- **Macros disabled:** \`${{ matrix.disable }}\`" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Fail job if build failed
        if: always() && steps.build.outcome == 'failure'
        run: exit 1

  coverage_report:
    name: Report
    permissions:
      contents: read
    needs: [build_all, macro_coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Download build metrics
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: build-metrics-*
          path: all-build-metrics

      - name: Download macro results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: macro-results-*
          path: all-macro-results

      - name: Calculate .c line coverage
        id: line_coverage
        run: |
          python3 .github/calculate_coverage.py \
            firmware/RAMNV1/Core/Inc/ramn_config.h \
            firmware/RAMNV1/Core/Src \
            all-macro-results > coverage_output.txt
          cat coverage_output.txt
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done < coverage_output.txt

      - name: Generate report
        run: |
          python3 .github/generate_report.py \
            --metrics-dir all-build-metrics \
            --results-dir all-macro-results \
            --config firmware/RAMNV1/Core/Inc/ramn_config.h \
            --total-lines "${{ steps.line_coverage.outputs.total_lines }}" \
            --compiled-lines "${{ steps.line_coverage.outputs.compiled_lines }}" \
            --coverage-pct "${{ steps.line_coverage.outputs.coverage_pct }}"

      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload coverage report artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            report.md
            pr-number.txt

      - name: Write step summary
        if: always()
        run: cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Fail if upstream builds failed
        if: always() && (needs.build_all.result == 'failure' || needs.macro_coverage.result == 'failure')
        run: exit 1

  release:
    name: Upload release firmware
    needs: [build_all, macro_coverage]
    if: always() && github.event_name == 'release' && needs.build_all.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: all-firmware

      - name: Package and upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd all-firmware
          for dir in */; do
            name="${dir%/}"
            ( cd "$dir" && zip -j "../../${name}.zip" *.hex )
          done
          cd ..
          for zipfile in firmware-*.zip; do
            echo "Uploading ${zipfile}..."
            gh release upload "$RELEASE_TAG" "$zipfile" --clobber --repo "$GH_REPO"
          done
